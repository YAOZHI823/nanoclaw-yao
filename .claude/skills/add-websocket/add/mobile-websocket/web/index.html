<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>NanoClaw</title>
  <style>
* {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}

:root {
  --primary-color: #007AFF;
  --bg-color: #f5f5f7;
  --chat-bg: #ffffff;
  --user-msg-bg: #007AFF;
  --assistant-msg-bg: #E9E9EB;
  --text-color: #000;
  --text-inverse: #fff;
  --border-color: #ddd;
}

html, body {
  height: 100%;
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
  background: var(--bg-color);
  color: var(--text-color);
}

#app {
  height: 100%;
  display: flex;
  flex-direction: column;
  max-width: 600px;
  margin: 0 auto;
  background: var(--chat-bg);
}

/* 状态栏 */
.status-bar {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 10px 16px;
  background: #fff;
  border-bottom: 1px solid var(--border-color);
  -webkit-user-select: none;
}

.status-indicator {
  display: flex;
  align-items: center;
  gap: 6px;
}

.status-dot {
  width: 8px;
  height: 8px;
  border-radius: 50%;
  background: #8e8e93;
}

.status-dot.connected {
  background: #34C759;
}

.status-dot.connecting {
  background: #FF9500;
  animation: pulse 1s infinite;
}

.status-dot.disconnected {
  background: #FF3B30;
}

@keyframes pulse {
  0%, 100% { opacity: 1; }
  50% { opacity: 0.5; }
}

.status-text {
  font-size: 13px;
  color: #8e8e93;
}

.rebind-btn {
  font-size: 13px;
  color: var(--primary-color);
  background: none;
  border: none;
  cursor: pointer;
}

/* 屏幕 */
.screen {
  flex: 1;
  display: flex;
  flex-direction: column;
}

/* 绑定/配对界面 */
.bind-card {
  flex: 1;
  display: flex;
  flex-direction: column;
  justify-content: center;
  align-items: center;
  padding: 40px 20px;
  text-align: center;
}

.bind-card h1 {
  font-size: 28px;
  font-weight: 600;
  margin-bottom: 8px;
}

.bind-card .subtitle {
  font-size: 15px;
  color: #8e8e93;
  margin-bottom: 24px;
}

.device-id {
  font-size: 13px;
  color: #8e8e93;
  margin-bottom: 24px;
}

.pairing-code {
  font-size: 48px;
  font-weight: 700;
  letter-spacing: 8px;
  color: var(--primary-color);
  margin: 20px 0;
}

.bind-card .hint {
  font-size: 13px;
  color: #8e8e93;
  margin-bottom: 24px;
}

.btn {
  padding: 14px 32px;
  font-size: 17px;
  font-weight: 600;
  border: none;
  border-radius: 12px;
  cursor: pointer;
  transition: opacity 0.2s;
}

.btn:active {
  opacity: 0.7;
}

.btn.primary {
  background: var(--primary-color);
  color: var(--text-inverse);
}

.verify-input {
  padding: 14px 20px;
  font-size: 24px;
  font-weight: 700;
  letter-spacing: 8px;
  text-align: center;
  border: 2px solid var(--border-color);
  border-radius: 12px;
  margin-bottom: 16px;
  outline: none;
  width: 200px;
}

.verify-input:focus {
  border-color: var(--primary-color);
}

.btn.secondary {
  background: var(--assistant-msg-bg);
  color: var(--text-color);
}

/* 聊天界面 */
#chat-screen {
  flex: 1;
  display: flex;
  flex-direction: column;
  overflow: hidden;
}

.chat-header {
  padding: 12px 16px;
  background: #f9f9f9;
  border-bottom: 1px solid var(--border-color);
  font-weight: 600;
  text-align: center;
}

.messages-container {
  flex: 1;
  overflow-y: auto;
  padding: 16px;
  display: flex;
  flex-direction: column;
}

#messages-list {
  display: flex;
  flex-direction: column;
  min-height: 100%;
}

.loading-more {
  text-align: center;
  padding: 8px;
  color: #8e8e93;
  font-size: 13px;
}

.message {
  max-width: 80%;
  margin-bottom: 16px;
  animation: fadeIn 0.2s ease;
}

@keyframes fadeIn {
  from { opacity: 0; transform: translateY(10px); }
  to { opacity: 1; transform: translateY(0); }
}

.message.user {
  align-self: flex-end;
}

.message.assistant {
  align-self: flex-start;
}

.message-content {
  padding: 12px 16px;
  border-radius: 18px;
  font-size: 16px;
  line-height: 1.4;
  word-wrap: break-word;
}

.message.user .message-content {
  background: var(--user-msg-bg);
  color: var(--text-inverse);
  border-bottom-right-radius: 4px;
}

.message.assistant .message-content {
  background: var(--assistant-msg-bg);
  color: var(--text-color);
  border-bottom-left-radius: 4px;
}

.message-time {
  font-size: 11px;
  color: #8e8e93;
  margin-top: 4px;
}

.message.user .message-time {
  text-align: right;
}

.message.typing .message-content {
  display: flex;
  gap: 4px;
}

.message.typing .message-content::after {
  content: '...';
  animation: typing 1s infinite;
}

@keyframes typing {
  0%, 100% { opacity: 0.3; }
  50% { opacity: 1; }
}

/* 思考过程 */
.thinking {
  font-size: 13px;
  color: #8e8e93;
  background: #f0f0f0;
  padding: 8px 12px;
  border-radius: 8px;
  margin-bottom: 8px;
  max-height: 150px;
  overflow-y: auto;
  white-space: pre-wrap;
  word-wrap: break-word;
}

/* Markdown 样式 */
.message-content code.inline {
  background: #f0f0f0;
  padding: 2px 6px;
  border-radius: 4px;
  font-family: 'SF Mono', Monaco, monospace;
  font-size: 14px;
}

.message-content pre {
  background: #1e1e1e;
  color: #d4d4d4;
  padding: 12px;
  border-radius: 8px;
  overflow-x: auto;
  margin: 8px 0;
}

.message-content pre code {
  background: none;
  padding: 0;
  color: inherit;
}

.message-content a {
  color: #007AFF;
  text-decoration: none;
}

.message-content a:hover {
  text-decoration: underline;
}

/* 输入区域 */
.input-area {
  display: flex;
  padding: 12px 16px;
  background: #f9f9f9;
  border-top: 1px solid var(--border-color);
  gap: 8px;
}

#message-input {
  flex: 1;
  padding: 12px 16px;
  font-size: 16px;
  border: 1px solid var(--border-color);
  border-radius: 20px;
  outline: none;
  background: #fff;
  resize: none;
  font-family: inherit;
  max-height: 100px;
  overflow-y: auto;
  white-space: pre-wrap;
  word-wrap: break-word;
}

#message-input:focus {
  border-color: var(--primary-color);
}

.send-btn {
  padding: 12px 20px;
  font-size: 16px;
  font-weight: 600;
  background: var(--primary-color);
  color: var(--text-inverse);
  border: none;
  border-radius: 20px;
  cursor: pointer;
}

.send-btn:disabled {
  background: #ccc;
}

/* 文件传输 */
.file-btn {
  padding: 12px;
  font-size: 18px;
  background: none;
  border: none;
  cursor: pointer;
}

#file-input {
  display: none;
}

.upload-progress {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 8px 12px;
  background: #f0f0f0;
  border-radius: 8px;
  margin: 8px 0;
  font-size: 13px;
}

.progress-bar {
  flex: 1;
  height: 4px;
  background: #ddd;
  border-radius: 2px;
  overflow: hidden;
}

.progress-bar-fill {
  height: 100%;
  background: var(--primary-color);
  transition: width 0.2s;
}

/* 文件消息 */
.file-attachment {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 12px 16px;
  background: #f0f0f0;
  border-radius: 12px;
  margin: 8px 0;
}

.file-icon {
  font-size: 32px;
}

.file-info {
  flex: 1;
}

.file-name {
  font-weight: 600;
  font-size: 14px;
  word-break: break-all;
}

.file-size {
  font-size: 12px;
  color: #8e8e93;
}

.download-btn {
  padding: 8px 16px;
  font-size: 14px;
  background: var(--primary-color);
  color: white;
  border: none;
  border-radius: 8px;
  cursor: pointer;
}

.download-btn:active {
  opacity: 0.7;
}
  </style>
</head>
<body>
  <div id="app">
    <!-- 状态栏 -->
    <header class="status-bar">
      <div class="status-indicator" id="status-indicator">
        <span class="status-dot"></span>
        <span class="status-text" id="status-text">连接中...</span>
      </div>
      <button class="rebind-btn" id="rebind-btn" style="display: none;">重新绑定</button>
    </header>

    <!-- 绑定界面 -->
    <div id="bind-screen" class="screen">
      <div class="bind-card">
        <h1>NanoClaw</h1>
        <p class="subtitle">连接到 AI 助手</p>
        <div class="device-id" id="device-id"></div>
        <button class="btn primary" id="request-pairing-btn">请求配对</button>
      </div>
    </div>

    <!-- 配对界面 -->
    <div id="pairing-screen" class="screen" style="display: none;">
      <div class="bind-card">
        <h1>配对中</h1>
        <p class="subtitle">请在 NanoClaw 端查看配对码</p>
        <div class="pairing-code" id="pairing-code">------</div>
        <p class="hint">配对码有效期 5 分钟</p>
        <input type="text" id="verify-code-input" class="verify-input" placeholder="输入配对码" maxlength="6">
        <button class="btn primary" id="verify-pairing-btn">确认配对</button>
        <button class="btn secondary" id="cancel-pairing-btn">取消</button>
      </div>
    </div>

    <!-- 聊天界面 -->
    <div id="chat-screen" class="screen" style="display: none;">
      <div class="chat-header">
        <span>🤖 NanoClaw</span>
      </div>

      <div class="messages-container" id="messages-container">
        <div class="loading-more" id="loading-more" style="display: none;">
          <span>加载更多...</span>
        </div>
        <div id="messages-list"></div>
      </div>

      <div class="input-area">
        <button class="file-btn" id="file-btn" title="发送文件">📎</button>
        <input type="file" id="file-input">
        <textarea id="message-input" placeholder="发送消息... (Enter发送, Shift+Enter换行)" rows="1" autocomplete="off" onkeydown="handleEnter(event)"></textarea>
        <button class="send-btn" id="send-btn">发送</button>
      </div>
    </div>
  </div>

  <script>
const WS_URL = window.location.protocol === 'https:'
  ? 'wss://' + window.location.host + ':9876'
  : 'ws://localhost:9876';

const STORAGE_KEY = 'nanoclaw_device';
const PAIRED_KEY = 'nanoclaw_paired';
const MESSAGES_KEY = 'nanoclaw_messages_';

let ws = null;
let deviceId = null;
let isPaired = false;
let reconnectAttempts = 0;
let reconnectTimer = null;
let pingInterval = null;
let isConnected = false;

// DOM Elements
const elements = {
  statusIndicator: document.getElementById('status-indicator'),
  statusText: document.getElementById('status-text'),
  rebindBtn: document.getElementById('rebind-btn'),
  bindScreen: document.getElementById('bind-screen'),
  pairingScreen: document.getElementById('pairing-screen'),
  chatScreen: document.getElementById('chat-screen'),
  deviceIdEl: document.getElementById('device-id'),
  pairingCodeEl: document.getElementById('pairing-code'),
  verifyCodeInput: document.getElementById('verify-code-input'),
  verifyPairingBtn: document.getElementById('verify-pairing-btn'),
  requestPairingBtn: document.getElementById('request-pairing-btn'),
  cancelPairingBtn: document.getElementById('cancel-pairing-btn'),
  messagesContainer: document.getElementById('messages-container'),
  messagesList: document.getElementById('messages-list'),
  loadingMore: document.getElementById('loading-more'),
  messageInput: document.getElementById('message-input'),
  sendBtn: document.getElementById('send-btn'),
  fileBtn: document.getElementById('file-btn'),
  fileInput: document.getElementById('file-input'),
};

// 初始化
function init() {
  loadDeviceId();
  loadMessages();
  setupEventListeners();

  // 初始化输入控件状态（默认禁用）
  updateInputControls();

  // 根据配对状态显示对应界面
  if (isPaired) {
    showScreen('chat');
    elements.rebindBtn.style.display = 'block';
  }

  connect();
}

// 加载或生成 deviceId
function loadDeviceId() {
  const stored = localStorage.getItem(STORAGE_KEY);
  if (stored) {
    deviceId = stored;
  } else {
    deviceId = 'web-' + Date.now() + '-' + Math.random().toString(36).slice(2, 8);
    localStorage.setItem(STORAGE_KEY, deviceId);
  }

  // 检查是否已配对
  isPaired = localStorage.getItem(PAIRED_KEY) === 'true';

  elements.deviceIdEl.textContent = '设备 ID: ' + deviceId;
}

// 获取消息存储key
function getMessagesKey() {
  return MESSAGES_KEY + deviceId;
}

// 加载消息历史（只加载最近20条）
let allMessages = [];
const MESSAGES_LIMIT = 20;

function loadMessages() {
  try {
    const stored = localStorage.getItem(getMessagesKey());
    if (stored) {
      allMessages = JSON.parse(stored);
      // 只渲染最近20条
      const recentMessages = allMessages.slice(-MESSAGES_LIMIT);
      renderMessages(recentMessages);
    }
  } catch (e) {
    console.error('Failed to load messages:', e);
  }
}

// 加载更多历史消息
function loadMoreMessages() {
  const currentCount = elements.messagesList.children.length;
  if (currentCount >= allMessages.length) return; // 已加载全部

  const startIdx = Math.max(0, allMessages.length - currentCount - MESSAGES_LIMIT);
  const endIdx = allMessages.length - currentCount;
  const moreMessages = allMessages.slice(startIdx, endIdx);

  // 在顶部插入消息
  const fragment = document.createDocumentFragment();
  moreMessages.forEach(msg => {
    const div = createMessageElement(msg);
    fragment.appendChild(div);
  });
  elements.messagesList.insertBefore(fragment, elements.messagesList.firstChild);
}

// 创建消息元素
function createMessageElement(msg) {
  const div = document.createElement('div');
  div.className = 'message ' + msg.from;

  if (msg.from === 'assistant' && msg.thinking) {
    const thinkingEl = document.createElement('div');
    thinkingEl.className = 'thinking';
    thinkingEl.textContent = '🤔 ' + msg.thinking;
    div.appendChild(thinkingEl);
  }

  const content = document.createElement('div');
  content.className = 'message-content';
  content.innerHTML = parseMarkdown(msg.content);

  div.appendChild(content);

  // 如果有文件附件
  if (msg.file && msg.file.fileName) {
    const fileEl = document.createElement('div');
    fileEl.className = 'file-attachment';

    const icon = document.createElement('span');
    icon.className = 'file-icon';
    icon.textContent = getFileIcon(msg.file.fileName);

    const info = document.createElement('div');
    info.className = 'file-info';

    const nameEl = document.createElement('div');
    nameEl.className = 'file-name';
    nameEl.textContent = msg.file.fileName;

    info.appendChild(nameEl);

    const downloadBtn = document.createElement('button');
    downloadBtn.className = 'download-btn';
    downloadBtn.textContent = '下载';

    // 优先使用 base64 数据，否则使用 url
    let fileData = '';
    let mimeType = msg.file.mimeType || 'application/octet-stream';

    if (msg.file.base64) {
      // 直接使用 base64 数据
      fileData = msg.file.base64;
      downloadBtn.dataset.base64 = fileData;
      downloadBtn.dataset.mimeType = mimeType;
    } else if (msg.file.url && msg.file.url.startsWith('blob:')) {
      // 尝试从 url 获取（可能已失效）
      fileData = msg.file.url;
    }

    downloadBtn.dataset.fileName = msg.file.fileName;

    downloadBtn.onclick = function() {
      const base64 = this.dataset.base64;
      const fileName = this.dataset.fileName;
      const mime = this.dataset.mimeType;

      if (base64) {
        // 从 base64 重新创建 blob URL
        const blob = base64ToBlob(base64, mime);
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = fileName;
        a.click();
      } else {
        // 尝试使用存储的 URL
        const a = document.createElement('a');
        a.href = fileData;
        a.download = fileName;
        a.click();
      }
    };

    fileEl.appendChild(icon);
    fileEl.appendChild(info);
    fileEl.appendChild(downloadBtn);
    div.appendChild(fileEl);
  }

  const time = document.createElement('div');
  time.className = 'message-time';
  time.textContent = formatTime(msg.timestamp);

  div.appendChild(time);
  return div;
}

// Markdown 解析
function parseMarkdown(text) {
  if (!text) return '';

  // 转义 HTML
  let html = text
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;');

  // 代码块 ```...```
  html = html.replace(/```(\w*)\n?([\s\S]*?)```/g, '<pre><code class="lang-$1">$2</code></pre>');

  // 行内代码 `...`
  html = html.replace(/`([^`]+)`/g, '<code class="inline">$1</code>');

  // 加粗 **...**
  html = html.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');

  // 斜体 *...*
  html = html.replace(/\*([^*]+)\*/g, '<em>$1</em>');

  // 删除线 ~~...~~
  html = html.replace(/~~([^~]+)~~/g, '<del>$1</del>');

  // 链接 [text](url)
  html = html.replace(/\[([^\]]+)\]\(([^)]+)\)/g, '<a href="$2" target="_blank">$1</a>');

  // 换行
  html = html.replace(/\n/g, '<br>');

  return html;
}

// 保存消息
function saveMessage(msg) {
  try {
    const key = getMessagesKey();
    const messages = JSON.parse(localStorage.getItem(key) || '[]');
    messages.push(msg);
    // 最多保存500条
    if (messages.length > 500) {
      messages.splice(0, messages.length - 500);
    }
    localStorage.setItem(key, JSON.stringify(messages));
  } catch (e) {
    console.error('Failed to save message:', e);
  }
}

// 渲染消息
function renderMessages(messages) {
  elements.messagesList.innerHTML = '';
  messages.forEach(msg => addMessageToUI(msg));
  scrollToBottom();
}

// 添加单条消息到UI
function addMessageToUI(msg) {
  const div = createMessageElement(msg);
  elements.messagesList.appendChild(div);
  scrollToBottom();
}

// 格式化时间
function formatTime(timestamp) {
  const date = new Date(timestamp);
  return date.toLocaleTimeString('zh-CN', { hour: '2-digit', minute: '2-digit' });
}

// 滚动到底部
function scrollToBottom() {
  requestAnimationFrame(() => {
    elements.messagesContainer.scrollTop = elements.messagesContainer.scrollHeight;
  });
}

// 设置事件监听
function setupEventListeners() {
  // 请求配对
  elements.requestPairingBtn.addEventListener('click', requestPairing);
  elements.cancelPairingBtn.addEventListener('click', cancelPairing);

  // 验证配对
  elements.verifyPairingBtn.addEventListener('click', verifyPairing);
  elements.verifyCodeInput.addEventListener('keypress', (e) => {
    if (e.key === 'Enter') verifyPairing();
  });

  // 发送消息
  elements.sendBtn.addEventListener('click', sendMessage);

  // 重新绑定
  elements.rebindBtn.addEventListener('click', rebind);

  // 滚动加载历史
  elements.messagesContainer.addEventListener('scroll', () => {
    if (elements.messagesContainer.scrollTop < 50) {
      loadMoreMessages();
    }
  });

  // textarea 自动高度
  elements.messageInput.addEventListener('input', autoResizeTextarea);

  // 文件上传
  elements.fileBtn.addEventListener('click', () => elements.fileInput.click());
  elements.fileInput.addEventListener('change', handleFileSelect);
}

// 检测是否为移动端
const isMobile = /iPhone|iPad|iPod|Android|webOS|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent) ||
  ('ontouchstart' in window) ||
  (navigator.maxTouchPoints > 0);

// Enter 键处理
let isShiftPressed = false;
window.handleEnter = function(e) {
  // 移动端：Enter 键总是换行，发送用按钮
  if (isMobile) {
    if (e.key === 'Enter' && !e.shiftKey) {
      // 移动端 Enter 键：换行
      // 不阻止默认行为，允许 textarea 换行
    }
    return;
  }

  // 桌面端：Enter 发送，Shift+Enter 换行
  console.log('key:', e.key, 'shiftKey:', e.shiftKey);
  if (e.key === 'Shift') {
    isShiftPressed = true;
    return;
  }
  if (e.key === 'Enter') {
    if (isShiftPressed) {
      // Shift+Enter: 允许换行
      console.log('Shift+Enter: allow newline');
      isShiftPressed = false;
    } else {
      // Enter: 发送消息
      console.log('Enter: send message');
      e.preventDefault();
      sendMessage();
    }
  }
};

// 释放 Shift 键时重置标志
window.addEventListener('keyup', function(e) {
  if (e.key === 'Shift') {
    isShiftPressed = false;
  }
});

// 自动调整 textarea 高度
function autoResizeTextarea() {
  const textarea = elements.messageInput;
  textarea.style.height = 'auto';
  textarea.style.height = Math.min(textarea.scrollHeight, 100) + 'px';
}

// 请求配对
function requestPairing() {
  showScreen('pairing');
  send({ type: 'pairing_request', deviceId });
}

// 取消配对
function cancelPairing() {
  showScreen('bind');
  elements.pairingCodeEl.textContent = '------';
}

// 验证配对
function verifyPairing() {
  const code = elements.verifyCodeInput.value.trim().toUpperCase();
  if (!code || code.length !== 6) {
    alert('请输入6位配对码');
    return;
  }
  console.log('Verifying with code:', code);
  send({ type: 'pairing_verify', deviceId, pairingCode: code });
}

// 重新绑定
function rebind() {
  localStorage.removeItem(STORAGE_KEY);
  localStorage.removeItem(getMessagesKey());
  isPaired = false;
  deviceId = null;
  loadDeviceId();
  elements.messagesList.innerHTML = '';
  showScreen('bind');
  elements.rebindBtn.style.display = 'none';
  updateInputControls();
}

// 发送消息
function sendMessage() {
  // 检查连接状态
  if (!isConnected || !isPaired) {
    alert('请等待连接成功后再发送消息');
    return;
  }

  const rawValue = elements.messageInput.value;
  const content = rawValue.trim();
  if (!content) return;

  elements.messageInput.value = '';
  elements.messageInput.style.height = 'auto';

  // 添加用户消息到UI
  const msg = { from: 'user', content, timestamp: Date.now() };
  addMessageToUI(msg);
  saveMessage(msg);

  // 发送消息到服务器
  send({ type: 'message', content });

  // 显示正在输入
  showTyping();
}

// 显示正在输入
function showTyping() {
  const div = document.createElement('div');
  div.className = 'message assistant typing';
  div.id = 'typing-indicator';

  const content = document.createElement('div');

// 文件上传处理
let pendingFile = null;

function handleFileSelect(e) {
  const file = e.target.files[0];
  if (!file) return;

  // 检查连接状态
  if (!isConnected || !isPaired) {
    alert('请等待连接成功后再上传文件');
    e.target.value = '';
    return;
  }

  // 显示上传进度
  showUploadProgress(file.name, file.size);

  // 读取文件并发送
  const reader = new FileReader();
  reader.onload = function(event) {
    const base64 = event.target.result.split(',')[1];
    sendFile(file.name, file.size, file.type, base64);
  };
  reader.readAsDataURL(file);

  // 清空 input 以便再次选择同一文件
  e.target.value = '';
}

function showUploadProgress(fileName, fileSize) {
  const div = document.createElement('div');
  div.className = 'message user';
  div.id = 'upload-progress';

  const progressEl = document.createElement('div');
  progressEl.className = 'upload-progress';

  const fileNameEl = document.createElement('span');
  fileNameEl.textContent = '上传中: ' + fileName;

  const progressBar = document.createElement('div');
  progressBar.className = 'progress-bar';

  const progressFill = document.createElement('div');
  progressFill.className = 'progress-bar-fill';
  progressFill.style.width = '0%';
  progressFill.id = 'progress-fill';

  progressBar.appendChild(progressFill);
  progressEl.appendChild(fileNameEl);
  progressEl.appendChild(progressBar);
  div.appendChild(progressEl);
  elements.messagesList.appendChild(div);
  scrollToBottom();
}

function updateUploadProgress(percent) {
  const fill = document.getElementById('progress-fill');
  if (fill) {
    fill.style.width = percent + '%';
  }
}

function hideUploadProgress() {
  const progress = document.getElementById('upload-progress');
  if (progress) {
    progress.remove();
  }
}

async function sendFile(fileName, fileSize, mimeType, base64) {
  const fileId = 'file-' + Date.now() + '-' + Math.random().toString(36).slice(2, 8);
  const chunkSize = 16 * 1024; // 16KB chunks
  const totalChunks = Math.ceil(base64.length / chunkSize);

  // 发送 file_start
  send({
    type: 'file_start',
    fileId,
    fileName,
    fileSize,
    mimeType,
  });

  // 发送 chunks
  for (let i = 0; i < totalChunks; i++) {
    const chunk = base64.slice(i * chunkSize, (i + 1) * chunkSize);
    send({
      type: 'file_chunk',
      fileId,
      chunk,
    });

    // 更新进度
    const progress = Math.round(((i + 1) / totalChunks) * 100);
    updateUploadProgress(progress);

    // 小延迟避免阻塞
    await new Promise(resolve => setTimeout(resolve, 10));
  }

  // 发送 file_end
  send({
    type: 'file_end',
    fileId,
  });

  // 保存待确认的文件
  pendingFile = { fileId, fileName, fileSize };

  // 显示用户消息（带文件信息）
  const msg = {
    from: 'user',
    content: '[发送了文件: ' + fileName + ' (' + formatFileSize(fileSize) + ')]',
    timestamp: Date.now(),
  };
  addMessageToUI(msg);
  saveMessage(msg);
}

// 隐藏正在输入
function hideTyping() {
  const indicator = document.getElementById('typing-indicator');
  if (indicator) {
    indicator.remove();
  }
}

// WebSocket 连接
function connect() {
  updateStatus('connecting', '连接中...');

  ws = new WebSocket(WS_URL);

  ws.onopen = () => {
    console.log('WebSocket connected');
    reconnectAttempts = 0;
    updateStatus('connected', '已连接');

    // 如果已配对，重新发送配对请求
    if (isPaired) {
      send({ type: 'pairing_request', deviceId });
    }

    // 启动心跳
    startPing();
  };

  ws.onmessage = (event) => {
    try {
      const msg = JSON.parse(event.data);
      handleMessage(msg);
    } catch (e) {
      console.error('Failed to parse message:', e);
    }
  };

  ws.onclose = () => {
    console.log('WebSocket disconnected');
    updateStatus('disconnected', '已断开');
    stopPing();
    scheduleReconnect();
  };

  ws.onerror = (error) => {
    console.error('WebSocket error:', error);
    updateStatus('disconnected', '连接错误');
  };
}

// 发送WebSocket消息
function send(obj) {
  if (ws && ws.readyState === WebSocket.OPEN) {
    ws.send(JSON.stringify(obj));
    console.log('Sent:', obj.type);
  }
}

// 处理接收到的消息
function handleMessage(msg) {
  console.log('Received:', msg.type);

  switch (msg.type) {
    case 'pairing_challenge':
      elements.pairingCodeEl.textContent = msg.pairingCode;
      break;

    case 'pairing_success':
      isPaired = true;
      localStorage.setItem(PAIRED_KEY, 'true');
      showScreen('chat');
      elements.rebindBtn.style.display = 'block';
      updateInputControls();
      break;

    case 'pairing_failed':
      alert('配对失败: ' + msg.message);
      showScreen('bind');
      break;

    case 'message':
      hideTyping();

      // 提取思考过程（从content中查找<thinking>标签或使用独立的thinking字段）
      let thinking = msg.thinking;
      let content = msg.content;

      if (!thinking && content) {
        // 尝试从content中提取thinking
        const match = content.match(/<thinking>([\s\S]*?)<\/thinking>/i);
        if (match) {
          thinking = match[1].trim();
          content = content.replace(match[0], '').trim();
        }
      }

      // 添加助手消息
      const assistantMsg = {
        from: 'assistant',
        content: content,
        thinking: thinking,
        timestamp: msg.timestamp || Date.now()
      };
      addMessageToUI(assistantMsg);
      saveMessage(assistantMsg);
      break;

    case 'error':
      hideTyping();

      // 如果是未配对错误，自动重新请求配对
      if (msg.message === 'Not paired') {
        console.log('Not paired, auto requesting pairing...');
        // 清空配对状态，重新请求配对
        localStorage.removeItem(PAIRED_KEY);
        isPaired = false;
        showScreen('pairing');
        send({ type: 'pairing_request', deviceId });
      } else {
        const errorMsg = {
          from: 'assistant',
          content: '错误: ' + msg.message,
          timestamp: Date.now()
        };
        addMessageToUI(errorMsg);
        saveMessage(errorMsg);
      }
      break;

    case 'pong':
      // 心跳响应
      break;

    case 'file_received':
      // 文件上传确认
      hideUploadProgress();
      if (msg.status === 'ok') {
        // File uploaded successfully
      } else {
        alert('文件上传失败: ' + msg.message);
      }
      pendingFile = null;
      break;

    case 'file_start':
      handleIncomingFileStart(msg);
      break;

    case 'file_chunk':
      handleIncomingFileChunk(msg);
      break;

    case 'file_end':
      handleIncomingFileEnd(msg);
      break;
  }
}

// 接收文件
let incomingFile = null;

function handleIncomingFileStart(msg) {
  incomingFile = {
    fileId: msg.fileId,
    fileName: msg.fileName,
    fileSize: msg.fileSize,
    mimeType: msg.mimeType,
    chunks: [],
    receivedSize: 0,
  };

  // 显示接收进度
  showDownloadProgress(msg.fileName, msg.fileSize);
}

function handleIncomingFileChunk(msg) {
  if (!incomingFile) return;

  incomingFile.chunks.push(msg.chunk);
  incomingFile.receivedSize += atob(msg.chunk).length;

  // 更新进度
  const progress = Math.round((incomingFile.receivedSize / incomingFile.fileSize) * 100);
  updateDownloadProgress(progress);
}

function handleIncomingFileEnd(msg) {
  if (!incomingFile) {
    return;
  }

  // 合并 chunks
  const base64 = incomingFile.chunks.join('');

  // 创建下载
  const blob = base64ToBlob(base64, incomingFile.mimeType);
  const url = URL.createObjectURL(blob);

  // 显示文件消息
  const div = document.createElement('div');
  div.className = 'message assistant';

  const fileEl = document.createElement('div');
  fileEl.className = 'file-attachment';

  const icon = document.createElement('span');
  icon.className = 'file-icon';
  icon.textContent = getFileIcon(incomingFile.fileName);

  const info = document.createElement('div');
  info.className = 'file-info';

  const nameEl = document.createElement('div');
  nameEl.className = 'file-name';
  nameEl.textContent = incomingFile.fileName;

  const sizeEl = document.createElement('div');
  sizeEl.className = 'file-size';
  sizeEl.textContent = formatFileSize(incomingFile.fileSize);

  info.appendChild(nameEl);
  info.appendChild(sizeEl);

  const downloadBtn = document.createElement('button');
  downloadBtn.className = 'download-btn';
  downloadBtn.textContent = '下载';
  // Store base64 data in button for later access
  downloadBtn.dataset.base64 = base64;
  downloadBtn.dataset.mimeType = incomingFile.mimeType;
  downloadBtn.dataset.fileName = incomingFile.fileName;
  downloadBtn.onclick = function() {
    const base64 = this.dataset.base64;
    const mime = this.dataset.mimeType;
    const fileName = this.dataset.fileName;
    const blob = base64ToBlob(base64, mime);
    const blobUrl = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = blobUrl;
    a.download = fileName;
    a.click();
  };

  fileEl.appendChild(icon);
  fileEl.appendChild(info);
  fileEl.appendChild(downloadBtn);
  div.appendChild(fileEl);

  const time = document.createElement('div');
  time.className = 'message-time';
  time.textContent = formatTime(Date.now());

  div.appendChild(time);
  elements.messagesList.appendChild(div);
  scrollToBottom();

  // 保存消息 - 存储 base64 数据而不是 blob URL（blob URL 会在页面刷新后失效）
  const msgData = {
    from: 'assistant',
    content: '[收到文件: ' + incomingFile.fileName + ']',
    file: {
      fileName: incomingFile.fileName,
      mimeType: incomingFile.mimeType,
      base64: base64,  // 存储 base64 数据
    },
    timestamp: Date.now(),
  };
  saveMessage(msgData);

  hideDownloadProgress();
  incomingFile = null;
}

function showDownloadProgress(fileName, fileSize) {
  const div = document.createElement('div');
  div.className = 'message assistant';
  div.id = 'download-progress';

  const progressEl = document.createElement('div');
  progressEl.className = 'upload-progress';

  const fileNameEl = document.createElement('span');

  const progressBar = document.createElement('div');

  const progressFill = document.createElement('div');
  progressFill.className = 'progress-bar-fill';
  progressFill.style.width = '0%';
  progressFill.id = 'download-progress-fill';

  progressBar.appendChild(progressFill);
  progressEl.appendChild(fileNameEl);
  progressEl.appendChild(progressBar);
  div.appendChild(progressEl);
  elements.messagesList.appendChild(div);

}

function updateDownloadProgress(percent) {
  const fill = document.getElementById('download-progress-fill');
  if (fill) {
    fill.style.width = percent + '%';
  }
}

function hideDownloadProgress() {
  const progress = document.getElementById('download-progress');

function getFileIcon(fileName) {
  const ext = fileName.split('.').pop().toLowerCase();
  const icons = {
    pdf: '📄',
    doc: '📝', docx: '📝',
    xls: '📊', xlsx: '📊',
    ppt: '📽️', pptx: '📽️',
    jpg: '🖼️', jpeg: '🖼️', png: '🖼️', gif: '🖼️', webp: '🖼️',
    mp3: '🎵', wav: '🎵', ogg: '🎵',
    mp4: '🎬', mov: '🎬', avi: '🎬',
    zip: '📦', rar: '📦', '7z': '📦',
    txt: '📃',
    js: '📜', ts: '📜', py: '📜', java: '📜', go: '📜', rs: '📜',
    html: '🌐', css: '🎨', json: '📋', xml: '📋',
  };
  return icons[ext] || '📁';
}

function base64ToBlob(base64, mimeType) {
  const byteCharacters = atob(base64);
  const byteNumbers = new Array(byteCharacters.length);
  for (let i = 0; i < byteCharacters.length; i++) {
    byteNumbers[i] = byteCharacters.charCodeAt(i);
  }
  const byteArray = new Uint8Array(byteNumbers);
  return new Blob([byteArray], { type: mimeType });
}

function formatFileSize(bytes) {
  if (bytes < 1024) return bytes + ' B';
  if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + ' KB';
  return (bytes / (1024 * 1024)).toFixed(1) + ' MB';
}

// 心跳
function startPing() {
  stopPing();
  pingInterval = setInterval(() => {
    send({ type: 'ping' });
  }, 30000);
}

function stopPing() {
  if (pingInterval) {
    clearInterval(pingInterval);
    pingInterval = null;
  }
}

// 重连
function scheduleReconnect() {
  if (reconnectTimer) return;

  const delay = Math.min(1000 * Math.pow(2, reconnectAttempts), 30000);
  reconnectAttempts++;

  updateStatus('connecting', '重连中 (' + reconnectAttempts + ')...');

  reconnectTimer = setTimeout(() => {
    reconnectTimer = null;
    connect();
  }, delay);
}

// 更新状态显示
function updateStatus(state, text) {
  const dot = elements.statusIndicator.querySelector('.status-dot');
  dot.className = 'status-dot ' + state;
  elements.statusText.textContent = text;

  // 更新连接状态
  isConnected = (state === 'connected');

  // 根据连接状态启用/禁用输入控件
  updateInputControls();
}

// 更新输入控件的可用状态
function updateInputControls() {
  const connected = isConnected && isPaired;

  elements.sendBtn.disabled = !connected;
  elements.messageInput.disabled = !connected;
  elements.fileBtn.disabled = !connected;
  elements.fileInput.disabled = !connected;

  // 更新占位符文本
  if (!connected) {
    elements.messageInput.placeholder = '等待连接...';
  } else if (isMobile) {
    elements.messageInput.placeholder = '输入消息...';
  } else {
    elements.messageInput.placeholder = '发送消息... (Enter发送, Shift+Enter换行)';
  }
}

// 显示指定屏幕
function showScreen(screen) {
  elements.bindScreen.style.display = 'none';
  elements.pairingScreen.style.display = 'none';
  elements.chatScreen.style.display = 'none';

  switch (screen) {
    case 'bind':
      elements.bindScreen.style.display = 'flex';
      break;
    case 'pairing':
      elements.pairingScreen.style.display = 'flex';
      break;
    case 'chat':
      elements.chatScreen.style.display = 'flex';
      break;
  }
}
